 ### Subtype Descs ###
 liberalism_subtype_desc: "Liberalism is a political and moral philosophy based on liberty, consent of the governed and equality before the law."
 conservatism_subtype_desc: "Conservatism is a political and social philosophy promoting traditional social institutions in the context of culture and civilization."
 socialism_subtype_desc: "Socialism is a political, social and economic philosophy encompassing a range of economic and social systems characterised by social ownership of the means of production."
 communism_subtype_desc: "Communism is a philosophical, social, political, and economic ideology and movement whose ultimate goal is the establishment of a communist society."
 nationalism_subtype_desc: "Nationalism is an ideology and movement that promotes the interests of a particular nation, especially with the aim of gaining and maintaining the nation's sovereignty over its homeland."
 populism_subtype_desc: "Populism refers to a range of political stances that emphasize the idea of 'the people' and often juxtapose this group against 'the elite'."
 authoritarianism_subtype_desc: "Authoritarianism is a form of government characterized by strong central power and limited political freedoms."

